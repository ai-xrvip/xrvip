name: 秀人网vip

on:
  schedule:
    - cron: "0 22 * * *"    # UTC 22:00 = 北京时间次日 6:00
  workflow_dispatch:

concurrency:
  group: xiurenvip-scrape   # 同名 group 同时只允许一个 job 运行
  cancel-in-progress: false  # false = 新触发的等待；true = 新触发的直接取消旧的

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          CF_COOKIE: ${{ secrets.CF_COOKIE }}
        run: python scrape_telegraph.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add next_page.txt seen_xchina.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update page state"
            git push
          fi
